<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Works — li:st li/st [li]st</title>
    <style>
      @font-face {
        font-family: "MinBuri";
        src: url("addons/AG_Choijeongho_Minburi_Std_Bold.otf")
          format("opentype");
        font-weight: 900;
        font-style: normal;
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #000000;
        --text: #e8e8e0;
        --muted: #c7c4ba;
        --lime: #dfe43b;
        --blue: #2e77a8;
        --green: #1db4a5;
      }
      ::selection,
      ::-moz-selection {
        background: #dfe43b;
        color: #000000;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "MinBuri", sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        hyphens: none;
        -webkit-hyphens: none;
      }
      body.page {
        overflow-y: auto;
        overflow-x: hidden;
      }
      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 32px 40px;
        pointer-events: none;
      }
      .site-header .logo {
        font-size: clamp(20px, 2.6vw, 38px);
        font-weight: 900;
        color: var(--lime);
        text-decoration: none;
        pointer-events: auto;
      }
      .site-header nav {
        display: flex;
        gap: 36px;
        pointer-events: auto;
      }
      .nav-link {
        font-size: clamp(15px, 2.1vw, 30px);
        font-weight: 900;
        text-decoration: none;
        color: var(--text);
        transition: color 0.15s;
      }
      .nav-link:hover,
      .nav-link.active {
        color: var(--lime);
      }
      .works-page-title {
        padding: 110px 40px clamp(50px, 8vw, 120px);
      }
      @keyframes colorCycle {
        0%, 100% { color: #dfe43b; }
        33%       { color: #1db4a5; }
        66%       { color: #2e77a8; }
      }
      .works-page-title h1 {
        display: inline-block;
        font-size: clamp(27px, 4.1vw, 60px);
        font-weight: 900;
        line-height: 1;
        transform: rotate(-20deg);
        transform-origin: left top;
        animation: colorCycle 2.5s step-end infinite;
      }
      .works-list {
        padding-bottom: 120px;
      }
      .work-item {
        display: grid;
        grid-template-columns: 52px 1fr auto;
        gap: 0 20px;
        align-items: baseline;
        padding: 16px 40px;
        text-decoration: none;
        color: inherit;
      }
      .work-item:hover .item-num,
      .work-item:hover .item-title,
      .work-item:hover .item-artist {
        color: var(--lime);
      }
      .item-num {
        font-size: clamp(18px, 1.5vw, 22px);
        font-weight: 900;
        color: var(--text);
        transition: color 0.12s;
        padding-top: 4px;
        align-self: start;
      }
      .item-title {
        font-size: clamp(18px, 1.5vw, 22px);
        font-weight: 900;
        color: var(--text);
        line-height: 1.05;
        transition: color 0.12s;
      }
      .item-artist {
        font-size: clamp(18px, 1.5vw, 22px);
        font-weight: 400;
        color: var(--muted);
        text-align: right;
        transition: color 0.12s;
      }
      @media (max-width: 680px) {
        .site-header {
          padding: 20px 24px;
        }
        .works-page-title {
          padding-left: 24px;
          padding-right: 24px;
        }
        .work-item {
          grid-template-columns: 40px 1fr auto;
          padding-left: 24px;
          padding-right: 24px;
        }
      }
    </style>
  </head>
  <body class="page">
    <header class="site-header">
      <a class="logo" href="index.html">li:st li/st [li]st</a>
      <nav>
        <a class="nav-link" href="about.html">About</a>
        <a class="nav-link active" href="works.html">Works</a>
      </nav>
    </header>

    <div style="height: 96px"></div>

    <div class="works-page-title">
      <h1>Works</h1>
    </div>

    <div class="works-list" id="list"></div>

    <script>
      const WORKS = [
        { id:  1, artist: "김수현",         title: "Hospitalien",        desc: "지구력 3XXX 년, 인류는 외계인과 공존하게 되었습니다. 어딘가 불편해 찾은 우주 생물 의료 연합의 화상 진료 시스템에서 외계 출신 의사가 당신을 맞이합니다. 당신의 고민과 불편함을 털어놔보세요. 외계인의 시선에서 당신은 어떻게 진단될까요? 의외로 치료법은 간단할 수도 있습니다." },
        { id:  2, artist: "손서연, 신준성", title: "Redesigned DJ",      desc: "홍익대학교 최고의 브라우저 뮤지션 듀오 sarumago가 준비한 인터랙티브 리스닝 세션이 앰비언트 전자음악의 전설, Aphex Twin의 음악과 함께 R7로 찾아옵니다. 봄이 떠나기 전, 디제이이자 리스너가 되어 당신만의 파티를 즐겨보세요!" },
        { id:  3, artist: "유지예",         title: "결흔 (結痕)",         desc: "맺을 결(結) + 흉터 흔(痕) 이곳은 사랑의 찬란함보다 그 뒤에 남겨진 잔해를 위한 장소입니다. 익명의 고백으로 마음의 구멍을 메우고, 차마 전하지 못한 말들을 털어내며 남은 것들을 이 공간에 두고 가세요. 이제 타인이 아닌 오직 당신 자신에게 집중하며, 더 단단한 마음으로 내일을 향해 나아갈 수 있기를." },
        { id:  4, artist: "이승연",         title: "Still Breathing",    desc: "마지막으로 깊게 숨을 쉰 게 언제였나요? 이 작업은 지친 현대인들이 잠깐 속도를 늦추고, 자신의 호흡을 되찾을 수 있도록 만든 인터랙티브 웹입니다. 화면 앞에서 천천히, 숨을 쉬어보세요." },
        { id:  5, artist: "정유주",         title: "등산합시다!",         desc: "〈등산합시다!〉는 내가 정의한 등산의 개념에 맞춰 단어들을 새롭게 정의하는 장소이다. 나는 오르락 내리락하고 목표가 분명하지만 힘든, 정유주, 즉 내가 싫어하는 모든 것을 등산이라 칭하기로 했다. 그렇다면 무엇이 등산일까." },
        { id:  6, artist: "정준용",         title: "동의합니다^^",        desc: "동의는 가장 무거운 폭력입니다. 한 번의 동의는 이후의 모든 침범을 정당화하며 회수되지 아니합니다. 거부는 동의의 한 형식으로 처리됩니다. 본 캡션을 읽은 자는 본 작품의 모든 주장에 동의한 것으로 간주됩니다 ^^" },
        { id:  7, artist: "김태희",         title: "Crash Lab",          desc: "오늘날의 디지털 질서는 완벽한 정교함을 지향한다. 치밀하게 설계된 인터페이스 속에서 우리는 편리함과 통제를 동시에 경험한다. Crash Lab은 이 견고한 시스템을 다양한 도구로 해체해보는 실험 공간이다. 규격화된 화면을 무너뜨리는 그 순간, 매끈한 질서 뒤에 가려진 감각의 실체를 마주하기를 제안한다." },
        { id:  8, artist: "안상현",         title: "Musical Matryoshka", desc: "몸 속에 더 작은 몸을 품은 마트료시카처럼, 소리는 단 하나의 음으로 존재하지 않습니다. 침묵의 껍질을 벗겨내 당신의 손길로 이 단단한 정적을 열어주세요. 겹겹이 쌓인 선율의 층위를 지나 가장 깊은 곳에서 떨고 있는 소리에 닿을 때까지…" },
        { id:  9, artist: "오예림",         title: "Hongwarts!",         desc: "홍그와트 탐험기: R to C. 어디로든 통하는 건물, 홍그와트 홍익대학교에 입학한 것을 축하합니다! 새내기분들, R동에서 C동까지의 여정을 통해 홍그와트를 정복해보시겠습니까? 지도에 건물마다 놓여진 퀘스트를 깨어 홍익대학교의 숨은 길을 탐험해 보세요!" },
        { id: 10, artist: "유다인",         title: "Designed to Quit",   desc: "오늘날 계정 탈퇴는 가입보다 훨씬 복잡하다. Designed to Quit는 그 불편함을 관람자가 직접 겪게 하는 인터랙티브 웹 설치 작품이다. 반복되는 확인 요청과 희미한 버튼은 실제 다크패턴을 재현한다. 탈퇴를 마치는 순간, 모든 마찰이 누군가의 설계임을 깨닫게 된다." },
        { id: 11, artist: "유하은",         title: "Intangible Store",   desc: "형체가 없는 것을 소유할 수 있다면 어떨까? 감정과 추억, 찰나의 기억까지 상품이 되는 순간, 우리는 보이지 않는 것을 사고파는 존재가 된다. 무형의 상점(Intangible Store)은 사라지는 것들에 이름과 가격을 붙이며 소유의 경계에 대해 다시 묻는다." },
        { id: 12, artist: "장예원",         title: "HELLO_",             desc: "오늘날 우리는 텍스트로 많은 소통을 한다. 말의 의미를 전달하는 데 있어 문장 부호는 생각보다 더 중요한 역할을 하고 있다. Hello_는 보조적 요소인 문장 부호를 주인공으로 삼아, 간과하기 쉬운 대상에 눈길을 주도록 한다." },
        { id: 13, artist: "정다정",         title: "LOST IN SPACE",      desc: "한때 인류의 원대한 꿈이었던 인공위성은 궤도를 이탈해 우주 파편이 된다. 우리의 일상을 채우던 물건들 역시 기억 밖으로 밀려나 분실물이 된다. 상실이라는 개인적 경험을 광활한 우주 공간에서 공유함으로써 관객은 자신이 잃어버린 소중한 기억의 조각을 다시 발견하게 된다." },
        { id: 14, artist: "한산",           title: "CAPTCHA, 3x3",       desc: "디지털 환경에서 인간이 보이지 않는 행동 데이터로 판단되는 방식을 다룬다. 사용자는 퍼즐을 풀게 되며, 마우스로 이를 조작하는 과정에서 각 조각에 움직임이 기록되고 이미지가 점차 변형된다. 결과적으로 완성된 얼굴 대신 행동의 흔적만이 화면에 남는다." },
        { id: 15, artist: "현혜정",         title: "이세계 주점",         desc: "우리는 다양한 종족이 방문하는 주점입니다. 가지각색의 술이 존재하는 이세계 주점에 인간인 당신을 초대합니다~ 과음을 주의하세요! 우리에게는 귀가 보조 서비스가 없습니다!" },
      ];

      const list = document.getElementById("list");
      WORKS.forEach((w, i) => {
        list.insertAdjacentHTML(
          "beforeend",
          `
    <a class="work-item" href="work.html?id=${w.id}">
      <span class="item-num">${String(i + 1).padStart(2, "0")}</span>
      <p class="item-title">${w.title}</p>
      <p class="item-artist">${w.artist}</p>
    </a>
  `,
        );
      });
    </script>
  </body>
</html>
