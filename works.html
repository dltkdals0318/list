<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works — li:St li/st [li]st</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="page">

  <header class="site-header">
    <a class="logo" href="index.html">li:St</a>
    <nav>
      <a class="nav-link" href="about.html">About</a>
      <a class="nav-link active" href="works.html">Works</a>
    </nav>
  </header>

  <div style="height:96px"></div>

  <div class="works-page-title">
    <h1>Works</h1>
  </div>

  <div class="works-list" id="list"></div>

  <script src="data.js"></script>
  <script>
    const list = document.getElementById('list');
    WORKS.forEach((w, i) => {
      list.insertAdjacentHTML('beforeend', `
        <a class="work-item" href="work.html?id=${w.id}">
          <span class="item-num">${String(i + 1).padStart(2, '0')}</span>
          <div>
            <p class="item-title">${w.title}</p>
            <p class="item-artist">${w.artist}</p>
          </div>
        </a>
      `);
    });
  </script>
</body>
</html>
